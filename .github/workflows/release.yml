name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install platform dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install platform dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QoderWork Account Switcher ${{ github.ref_name }}"
          releaseBody: |
            请根据您的操作系统下载对应的安装包：

            - **Windows**: 下载 `.exe`（NSIS 安装程序）或 `.msi`
            - **macOS**: 下载 `.dmg` 或 `.app.tar.gz`

            详细更新日志请参阅 [CHANGELOG](./CHANGELOG.md)。
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QoderWork Account Switcher ${{ github.ref_name }}"
          releaseBody: |
            请根据您的操作系统下载对应的安装包：

            - **Windows**: 下载 `.exe`（NSIS 安装程序）或 `.msi`
            - **macOS**: 下载 `.dmg` 或 `.app.tar.gz`

            详细更新日志请参阅 [CHANGELOG](./CHANGELOG.md)。
          releaseDraft: false
          prerelease: false
          args: "--target aarch64-apple-darwin"
